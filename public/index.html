<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumex Поиск и Плеер</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <link href="/public/css/styles.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Lumex Demo</a>
      <form id="searchForm" class="d-flex ms-auto" role="search">
        <input id="searchInput" class="form-control me-2" type="search" placeholder="Название или KP ID" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Поиск</button>
      </form>
    </div>
  </nav>

  <div class="container my-4">
    <div class="row">
      <div class="col-lg-8">
        <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="420" data-setup='{}'>
          <p class="vjs-no-js">Для воспроизведения включите JavaScript</p>
        </video>
        <div id="adNotice" class="text-muted small mt-2" style="display:none;">Идёт преролл реклама…</div>
      </div>
      <div class="col-lg-4">
        <h5>Результаты</h5>
        <div id="results" class="list-group"></div>
        <div id="pagers" class="mt-3 d-flex gap-2"></div>
        <div class="mt-4">
          <h6>Трек/перевод</h6>
          <select id="translationSelect" class="form-select mb-2"></select>
          <div id="seriesSelectors" style="display:none;">
            <h6>Сезон</h6>
            <select id="seasonSelect" class="form-select mb-2"></select>
            <h6>Серия</h6>
            <select id="episodeSelect" class="form-select mb-2"></select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <!-- Video.js Ads + Google IMA for VAST preroll -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/7.4.0/videojs-contrib-ads.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.10.1/videojs.ima.css" />
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/7.4.0/videojs-contrib-ads.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.10.1/videojs.ima.min.js"></script>
  <script src="/public/js/app.js"></script>
</body>
</html>
