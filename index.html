<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск фильмов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .movie-card {
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: translateY(-5px);
        }
        .video-player {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .search-results {
            max-height: 400px;
            overflow-y: auto;
        }
        .loading {
            display: none;
        }
        .movie-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .player-container {
            position: relative;
            background: #000;
        }
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .player-container:hover .custom-controls {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container-fluid">
        <div class="row">
            <!-- Поиск и результаты -->
            <div class="col-md-4 p-4">
                <h2 class="mb-4"><i class="fas fa-search"></i> Поиск фильмов</h2>
                
                <!-- Поисковая форма -->
                <div class="mb-4">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Введите название фильма...">
                        <button class="btn btn-primary" type="button" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <!-- Результаты поиска -->
                <div id="searchResults" class="search-results">
                    <div class="text-center text-muted">
                        <i class="fas fa-film fa-3x mb-3"></i>
                        <p>Введите название фильма для поиска</p>
                    </div>
                </div>

                <!-- Загрузка -->
                <div id="loading" class="loading text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                </div>
            </div>

            <!-- Видеоплеер -->
            <div class="col-md-8 p-4">
                <div class="player-container">
                    <video id="videoPlayer" class="w-100" style="height: 70vh;" controls>
                        <source src="" type="video/mp4">
                        Ваш браузер не поддерживает видео.
                    </video>
                    
                    <!-- Информация о фильме -->
                    <div id="movieInfo" class="mt-3" style="display: none;">
                        <h4 id="movieTitle"></h4>
                        <p id="movieDetails" class="text-muted"></p>
                        <div id="translations" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для выбора перевода -->
    <div class="modal fade" id="translationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Выберите перевод</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="translationList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
